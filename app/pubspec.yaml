name: polylog
description: Polylog — AI-powered travel companion (Android)
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  geolocator: ^13.0.2
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  google_sign_in: ^6.2.2
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
