AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  polylog-backend — Phase 3 첫 배포 (fn-health).
  공용 실행 역할 SafeRole-polylog 강제(ADR-012), iam:CreateRole 미사용.

#공통 설정
Globals:
  Function:
    Runtime: python3.12 #사용 환경 
    Timeout: 10         #10초가 넘으면 무한 루프로 취급하고 종료
    MemorySize: 128     #128MB 메모리 할당
    Tracing: Active     #함수가 잘 돌아가는지 확인하는 기능 on
    # ★ ADR-012: iam:CreateRole 차단 → 공용 역할을 함수마다 Properties.Role 로 강제.
    #   Role 은 SAM Globals.Function 미지원 속성이라 각 함수에 개별 지정한다.
    # ★ 격리 정책: group=polylog 태그가 없는 자원은 explicit deny.
    #   CFN 생성 함수엔 태그가 자동 부착되지 않으므로 명시해 GetFunction 거부를 방지.
    Tags:
      group: polylog #앞으로 만들어질 모든 함수에 group=polylog 태그 자동 부착

#실제 조립(클라우드에 만들어낼 모든 자원)
Resources:
  # REST API. Authorizer는 Phase 4 인증 작업에서 활성화 — 지금은 NONE.
  PolylogApi:
    Type: AWS::Serverless::Api #API Gateway REST API 생성
    Properties:
      Name: polylog-api
      StageName: dev  #개발 단계라 dev
      TracingEnabled: true #API Gateway 트레이싱 켜서 호출 흐름 추적
      Tags:
        group: polylog

  # 첫 Lambda — 배포 파이프라인 자체를 검증하는 헬스체크.
  # FunctionName을 명시해 'polylog' prefix 강제 규칙을 보장.
  FnHealth:
    Type: AWS::Serverless::Function #람다 함수 생성
    Properties:
      FunctionName: polylog-fn-health
      # ★ ADR-012: 공용 실행 역할 재사용(iam:CreateRole 차단). 새 함수 추가 시 동일하게 명시.
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/health/
      Handler: app.lambda_handler
      Tags:
        group: polylog
      Events:
        Get: # 내가 정해준 이름
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /health
            Method: get

  # AI 장소 추천 — Bedrock Claude 3 Haiku(us-east-1) 호출.
  # Bedrock 응답 대기를 위해 Timeout 30초로 Globals(10초) 오버라이드.
  FnRecommend:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polylog-fn-recommend
      # ★ ADR-012: 공용 실행 역할 재사용(iam:CreateRole 차단).
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/recommend/
      Handler: app.lambda_handler # 이 폴더에서 가장 먼저 시작하는 함수 지정
      Timeout: 30
      Tags:
        group: polylog
      Events:
        Post: # 내가 정해준 이름
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /recommend
            Method: post

  # 일정 관리(서브3 MVP-A) — 추천 장소를 polylog-schedules 에 저장/조회.
  # Bedrock 호출 없이 DynamoDB PutItem/Query 만. SafeRole-polylog 가 polylog* 권한 보유(ADR-012).
  FnSchedule:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polylog-fn-schedule
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/schedule/
      Handler: app.lambda_handler
      Tags:
        group: polylog
      Events:
        Add:       # POST /schedule — 일정에 추가
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /schedule
            Method: post
        List:      # GET /schedule?trip_id=demo-trip — 타임라인 조회
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /schedule
            Method: get

  # 대화형 AI 플래너(fn-schedule 에서 분리) — Bedrock(Haiku+Sonnet)+Places 로 '하루 동선' 제안.
  # 무거운(최대 30초) 작업이라 가벼운 CRUD 와 격리(자원·고장·권한). Timeout 30s 로 오버라이드.
  FnPlanner:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polylog-fn-planner
      # ★ ADR-012: 공용 실행 역할 재사용(iam:CreateRole 차단).
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/planner/
      Handler: app.lambda_handler
      Timeout: 30
      Tags:
        group: polylog
      Events:
        Chat:      # POST /planner — 대화형 플래너
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /planner
            Method: post

  # 메뉴판 번역(서브1) — 사진을 Bedrock(Claude Haiku) 비전으로 직접 읽어 번역+설명+추천.
  # Textract 미사용(CJK OCR 불가). 이미지 바이트를 다루므로 메모리 256MB, 비전 호출 때문에 Timeout 30s.
  FnMenu:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polylog-fn-menu
      # ★ ADR-012: 공용 실행 역할 재사용(iam:CreateRole 차단).
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/menu/
      Handler: app.lambda_handler
      Timeout: 30
      MemorySize: 256
      Tags:
        group: polylog
      Events:
        Post:      # POST /menu — 메뉴판 분석
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /menu
            Method: post

  # 영수증 분석(서브2) — 사진을 Bedrock(Claude Haiku) 비전으로 직접 읽어 통화/품목/카테고리 인식
  # + 원화 환산(외부 환율 API). fn-menu 와 같은 파이프라인이라 메모리 256MB, Timeout 30s.
  # ⚠️ Textract 미사용(한글·일본어 CJK OCR 불가 → 비전으로 통일). 새 IAM 불필요.
  FnReceipt:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polylog-fn-receipt
      # ★ ADR-012: 공용 실행 역할 재사용(iam:CreateRole 차단).
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/receipt/
      Handler: app.lambda_handler
      Timeout: 30
      MemorySize: 256
      Tags:
        group: polylog
      Events:
        Post:      # POST /receipt — 영수증 분석
          Type: Api
          Properties:
            RestApiId: !Ref PolylogApi
            Path: /receipt
            Method: post

  # 인증 — API Gateway Lambda Authorizer(ADR-007: Google ID 토큰 검증).
  # ⚠️ 라우트(Api 이벤트)가 없는 '인가 전용' 함수다. authorizer 를 만들고 메서드에 붙이는
  #    작업은 deploy.sh 로 안 되므로 scripts/setup-authorizer.sh(수동)로 처리한다.
  # tokeninfo 로 검증해 외부 의존성 0. env GOOGLE_CLIENT_ID(=웹 클라이언트 ID, aud 검증)는
  # deploy.sh 5-5 블록에서 주입한다(없으면 aud 검증만 생략).
  FnAuthorizer:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polylog-fn-authorizer
      # ★ ADR-012: 공용 실행 역할 재사용(iam:CreateRole 차단).
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/SafeRole-polylog
      CodeUri: src/handlers/authorizer/
      Handler: app.lambda_handler
      Tags:
        group: polylog

# 배포 완료 수 영수증/안내판
Outputs: # 외부에서 접근 가능한 진짜 URL과 설명을 제공하는 출력값
  ApiUrl:
    Description: 헬스체크 기본 URL (뒤에 /health 를 붙여 호출)
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev
  HealthUrl:
    Description: 헬스체크 엔드포인트 (curl 대상)
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev/health
  RecommendUrl:
    Description: AI 장소 추천 엔드포인트 (POST)
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev/recommend
  ScheduleUrl:
    Description: 일정 추가(POST)/조회(GET) 엔드포인트
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev/schedule
  PlannerUrl:
    Description: 대화형 AI 플래너 엔드포인트 (POST)
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev/planner
  MenuUrl:
    Description: 메뉴판 번역 엔드포인트 (POST)
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev/menu
  ReceiptUrl:
    Description: 영수증 분석 엔드포인트 (POST)
    Value: !Sub https://${PolylogApi}.execute-api.${AWS::Region}.amazonaws.com/dev/receipt
